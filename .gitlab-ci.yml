# ============================================================
# Pipeline provisioning klinik self-hosted (Fase 2B).
#
# Dipicu dari panel super admin (tombol "Deploy otomatis") via pipeline trigger
# token. Panel mengirim variabel: CLINIC_ID, JOB_TOKEN, PANEL_URL. Job ini jalan
# di RUNNER SENDIRI (PC kita) dengan tag "klinik-deploy" + executor shell, jadi
# memakai Node/npm/wrangler yang sudah terpasang di mesin.
#
# Logika sebenarnya ada di scripts/ci-provision.mjs (lebih mudah dirawat daripada
# di YAML). Jalan hanya saat dipicu (bukan tiap push) berkat rules di bawah.
# ============================================================

stages:
  - provision

provision-clinic:
  stage: provision
  tags:
    - klinik-deploy
  # Hanya jalan saat dipicu lewat trigger token / pipeline trigger (bukan push biasa).
  rules:
    - if: '$CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "pipeline"'
  script:
    - node --version
    - npm ci
    - node scripts/ci-provision.mjs
